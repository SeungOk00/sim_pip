# Protein Binder Design Pipeline Configuration

project_root: /home01/hpc194a02/test/sim_pip

# Directory paths
paths:
  targets: targets
  runs: runs
  candidates: candidates
  configs: configs

# Phase 2: Evolutionary Generative Design
phase2:
  rfdiffusion:
    path: /home01/hpc194a02/test/sim_pip/RFdiffusion
    # De novo binder generation
    de_novo_T: 50                # Diffusion steps for de novo generation
    binder_length: "70-100"      # Binder length range (randomly sampled each run)
    noise_scale: 0.0             # Noise scale (0=high quality, 1=high diversity)
    # Refinement/partial diffusion
    refinement_T: 15             # Diffusion steps for refinement
    num_designs: 10              # Number of designs to generate
    max_refinement_iterations: 3 # Maximum refinement iterations
    # Target cropping (optional - adjust based on your target)
    target_residues: "1-150"     # Target residues to include
  
  proteinmpnn:
    path: /home01/hpc194a02/test/sim_pip/ProteinMPNN
    num_seq_per_target: 10
    sampling_temps: [0.1, 0.2, 0.3]
  
  max_candidates_per_target: 100

# Phase 3-A: Fast Screening
phase3_fast:
  chai:
    enabled: true
    path: /home01/hpc194a02/test/sim_pip/chai-lab
    venv_path: /home/so/sim_pip/.venv
    command_template: "chai-lab fold --use-msa-server --use-templates-server --device cuda:0 {input_path} {output_dir}"
  
  boltz:
    enabled: false
  
  gates:
    fail_threshold: 0.23
    refine_threshold: 0.49
    pass_threshold: 0.49

# Phase 3-B: Deep Validation
phase3_deep:
  colabfold:
    path: /home01/hpc194a02/test/sim_pip/ColabFold
  
  gates:
    rmsd_consensus_threshold: 2.0
    pae_interaction_threshold: 5.0

# Phase 4: Multi-Objective Optimization
phase4:
  rosetta:
    enabled: true
    fastrelax_cycles: 5
  
  # Objectives (minimize)
  objectives:
    interface_ddg_target: -30.0
    sap_target: 40.0
    total_score_per_res_target: -3.0
  
  # Hard constraints
  constraints:
    packstat_min: 0.60
    overall_rmsd_max: 2.0
    epitope_rmsd_max: 1.0
    rg_max: 16.0
    mhc2_strong_binders_max: 0
  
  # NSGA-II parameters
  nsga2:
    population_size: 100
    generations: 50
  
  # Final selection
  final_selection: 96

# Phase 5: Lab Automation
phase5:
  sop_template: configs/sop_template.md
  
  neo4j:
    enabled: false
    uri: bolt://localhost:7687
    username: neo4j
    password: password

# Execution settings
execution:
  dry_run: false
  retry_count: 2
  parallel_jobs: 4
